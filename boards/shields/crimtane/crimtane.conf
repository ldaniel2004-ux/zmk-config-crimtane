
# Enable deep sleep support
CONFIG_ZMK_SLEEP=y

# Enable the Soft Off feature 
CONFIG_ZMK_PM_SOFT_OFF=y

# Boost the Bluetooth transmission power to +8 dBm
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Set the custom display name of your keyboard when pairing over Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Crimtane"

# Use basic consumer usages for media keys to maximize compatibility with older OS/hardware
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Time before turning off LEDs/displays due to inactivity (30 seconds in milliseconds)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Time before disconnecting Bluetooth and entering deep sleep (15 minutes in milliseconds)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_ZMK_SETTINGS_RESET_ON_START=y